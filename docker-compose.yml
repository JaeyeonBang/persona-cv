services:
  # ─────────────────────────────────────────────
  # Neo4j — Graphiti Knowledge Graph 백엔드
  # ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: persona-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-persona-cv-local}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Neo4j Browser (http://localhost:7474)
      - "7687:7687"   # Bolt protocol (FastAPI → Neo4j)
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-persona-cv-local}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # FastAPI 백엔드
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: persona-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-persona-cv-local}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  neo4j-data:
